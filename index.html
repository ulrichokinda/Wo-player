<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Sky Player - Reseller Panel</title>
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sky Player" />
    
    <!-- Smart TV Compatibility -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Sky Player">
    <meta name="msapplication-TileColor" content="#000000">
    <meta name="msapplication-navbutton-color" content="#00AEEF">
    
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Smart TV Remote Back Button Handling
      window.addEventListener('keydown', function(e) {
        // Common TV Back Button KeyCodes: 
        // 10009 (Tizen), 461 (webOS), 8 (Android TV), 27 (Escape)
        if (e.keyCode === 10009 || e.keyCode === 461 || e.keyCode === 8 || e.keyCode === 27) {
          if (window.location.pathname !== '/') {
            e.preventDefault();
            window.history.back();
          }
        }
      });
    </script>
  </body>
</html>
